{% extends 'base.html' %}
{% block content %}
<div class="feedback-form">
    <h2>We Value Your Feedback</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}" style="color:green; text-align:center; margin-bottom:1rem;">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('feedback') }}">
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" name="name" id="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email">Email (optional)</label>
            <input type="email" name="email" id="email" class="form-control">
        </div>
        <div class="form-group">
            <label for="message">Your Feedback *</label>
            <textarea name="message" id="message" class="form-control" rows="5" required placeholder="Share your thoughts, suggestions, or report any issues..."></textarea>
        </div>
        <button type="submit" class="btn" style="width:100%;">Submit Feedback</button>
    </form>
</div>
{% endblock %}
