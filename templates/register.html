{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <h2>Register</h2>
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" class="form-control" required style="width:100%;padding:0.5rem;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" class="form-control" required style="width:100%;padding:0.5rem;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="form-control" required style="width:100%;padding:0.5rem;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" name="confirm_password" id="confirm_password" class="form-control" required style="width:100%;padding:0.5rem;">
        </div>
        <button type="submit" class="btn">Register</button>
    </form>
    <p style="margin-top:1rem;">Already have an account? <a href="{{ url_for('login') }}">Login here</a>.</p>
</div>
{% endblock %}
