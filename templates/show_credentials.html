{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 2rem auto; text-align:center;">
    <h2>Registration Successful!</h2>
    <p>Your account has been created. Please use the following credentials to log in:</p>
    <div style="margin: 2rem 0; padding: 1rem; background: #f5f5f5; border-radius: 8px;">
        <strong>Username:</strong> {{ username }}<br>
        <strong>Password:</strong> <span id="password-value">{{ password }}</span>
    </div>
    <p><a href="{{ url_for('login') }}" class="btn">Go to Login</a></p>
</div>
{% endblock %}
