{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <h2>Login</h2>
    <form method="POST">
        <div style="margin-bottom: 1rem;">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" class="form-control" required style="width:100%;padding:0.5rem;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="form-control" required style="width:100%;padding:0.5rem;">
        </div>
        <button type="submit" class="btn">Login</button>
    </form>
    <p style="margin-top:1rem;">Don't have an account? <a href="{{ url_for('register') }}">Register here</a>.</p>
</div>
{% endblock %}
